name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          binary="hostcollision"
          if [ "$GOOS" = "windows" ]; then binary="${binary}.exe"; fi
          go build -trimpath -ldflags="-s -w" -o "dist/${binary}" ./cmd/hostcollision
          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip "hostcollision-${GOOS}-${GOARCH}.zip" "$binary")
          else
            tar -C dist -czf "dist/hostcollision-${GOOS}-${GOARCH}.tar.gz" "$binary"
          fi
          rm "dist/${binary}"
      - uses: actions/upload-artifact@v4
        with:
          name: hostcollision-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        run: cd dist && sha256sum * > checksums.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
